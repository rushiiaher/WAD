<!DOCTYPE html>
<html lang="en">
<head>
    <title>Registered Users</title>
    <meta charset="UTF-8">

    <style>
        body{
            font-family: Arial;
            background:#f4f4f4;
            padding:30px;
        }

        table{
            width:100%;
            border-collapse:collapse;
            background:white;
        }

        th, td{
            padding:12px;
            border:1px solid #ddd;
            text-align:center;
        }

        th{
            background:#0d6efd;
            color:white;
        }
    </style>
</head>
<body>

<h2>Registered Users List</h2>

<table>
    <thead>
        <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Password</th>
        </tr>
    </thead>
    <tbody id="userTable">
    </tbody>
</table>

<script>
    let users = JSON.parse(localStorage.getItem("users")) || [];

    let table = document.getElementById("userTable");

    users.forEach(function(user){
        let row = `
            <tr>
                <td>${user.name}</td>
                <td>${user.email}</td>
                <td>${user.password}</td>
            </tr>
        `;
        table.innerHTML += row;
    });
</script>

</body>
</html>
