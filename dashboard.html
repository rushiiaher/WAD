    <!DOCTYPE html>
<html lang="en">
<head>
    <title>Enhanced College Dashboard</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        body{
            background:#eef2f7;
            font-family: Arial, sans-serif;
        }

        .sidebar{
            min-height:100vh;
            background:linear-gradient(180deg,#0d6efd,#084298);
            color:white;
            padding-top:20px;
        }

        .sidebar h3{
            text-align:center;
            margin-bottom:30px;
            font-weight:bold;
        }

        .sidebar a{
            display:block;
            color:white;
            text-decoration:none;
            padding:14px 20px;
            border-radius:8px;
            margin:5px 10px;
            transition:0.3s;
        }

        .sidebar a:hover{
            background:rgba(255,255,255,0.2);
        }

        .topbar{
            background:white;
            padding:15px 25px;
            border-radius:12px;
            box-shadow:0 4px 15px rgba(0,0,0,0.08);
            margin-bottom:25px;
        }

        .dashboard-card{
            border:none;
            border-radius:15px;
            padding:20px;
            color:white;
            transition:0.3s;
            box-shadow:0 6px 15px rgba(0,0,0,0.1);
        }

        .dashboard-card:hover{
            transform:translateY(-5px);
        }

        .icon{
            font-size:35px;
            opacity:0.8;
        }

        .bg1{background:linear-gradient(135deg,#667eea,#764ba2);}
        .bg2{background:linear-gradient(135deg,#43cea2,#185a9d);}
        .bg3{background:linear-gradient(135deg,#f7971e,#ffd200);}
        .bg4{background:linear-gradient(135deg,#ff512f,#dd2476);}
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">

        <!-- Sidebar -->
        <div class="col-md-2 sidebar">
            <h3>Admin Panel</h3>
            <a href="#"><i class="bi bi-speedometer2"></i> Dashboard</a>
            <a href="#"><i class="bi bi-people"></i> Students</a>
            <a href="#"><i class="bi bi-person-badge"></i> Faculty</a>
            <a href="#"><i class="bi bi-journal-text"></i> Exams</a>
            <a href="#"><i class="bi bi-award"></i> Results</a>
            <a href="#"><i class="bi bi-gear"></i> Settings</a>
        </div>

        <!-- Main Content -->
        <div class="col-md-10 p-4">

            <!-- Topbar -->
            <div class="topbar d-flex justify-content-between align-items-center">
                <div>
                    <h3>College Dashboard</h3>
                    <p class="mb-0 text-muted">Welcome Back, Admin</p>
                </div>
                <button class="btn btn-primary">Logout</button>
            </div>

            <!-- Cards -->
            <div class="row g-4">

                <div class="col-md-3">
                    <div class="dashboard-card bg1">
                        <div class="d-flex justify-content-between">
                            <div>
                                <h5>Total Students</h5>
                                <h2>1200</h2>
                            </div>
                            <i class="bi bi-people-fill icon"></i>
                        </div>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="dashboard-card bg2">
                        <div class="d-flex justify-content-between">
                            <div>
                                <h5>Total Faculty</h5>
                                <h2>85</h2>
                            </div>
                            <i class="bi bi-person-workspace icon"></i>
                        </div>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="dashboard-card bg3">
                        <div class="d-flex justify-content-between">
                            <div>
                                <h5>Upcoming Exams</h5>
                                <h2>12</h2>
                            </div>
                            <i class="bi bi-journal-check icon"></i>
                        </div>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="dashboard-card bg4">
                        <div class="d-flex justify-content-between">
                            <div>
                                <h5>Pending Results</h5>
                                <h2>5</h2>
                            </div>
                            <i class="bi bi-clock-history icon"></i>
                        </div>
                    </div>
                </div>

            </div>

        </div>

    </div>
</div>

</body>
</html>
