<!DOCTYPE html>
<html>
<head>
    <title>Student Portfolio App</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet"
    href="https://code.jquery.com/mobile/1.4.5/jquery.mobile-1.4.5.min.css">

    <script src="https://code.jquery.com/jquery-1.11.1.min.js"></script>

    <script src="https://code.jquery.com/mobile/1.4.5/jquery.mobile-1.4.5.min.js"></script>
</head>
<body>

    <!-- Home Page -->
    <div data-role="page" id="home">

        <div data-role="header">
            <h1>Student App</h1>
        </div>

        <div role="main" class="ui-content">
            <h2>Welcome Priyesh</h2>
            <p>This is a mobile friendly website using jQuery Mobile.</p>

            <a href="#about" class="ui-btn ui-btn-b">About Me</a>
            <a href="#contact" class="ui-btn ui-btn-b">Contact</a>
        </div>

        <div data-role="footer">
            <h4>jQuery Mobile Demo</h4>
        </div>
    </div>

    <!-- About Page -->
    <div data-role="page" id="about">

        <div data-role="header">
            <h1>About Me</h1>
        </div>

        <div role="main" class="ui-content">
            <p>Name: Priyesh</p>
            <p>Course: Information Technology</p>
            <p>College: KBTCOE</p>

            <a href="#home" class="ui-btn">Back Home</a>
        </div>
    </div>

    <!-- Contact Page -->
    <div data-role="page" id="contact">

        <div data-role="header">
            <h1>Contact Form</h1>
        </div>

        <div role="main" class="ui-content">

            <label for="name">Name:</label>
            <input type="text" id="name">

            <label for="message">Message:</label>
            <textarea id="message"></textarea>

            <button onclick="showAlert()">Submit</button>

            <a href="#home" class="ui-btn">Back Home</a>
        </div>
    </div>

    <script>
        function showAlert() {
            alert("Form Submitted Successfully!");
        }
    </script>

</body>
</html>
